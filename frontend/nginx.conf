server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # 1. API Proxy for Raspberry Pi Backend (Status, Light, Motor)
    location /pi/ {
        rewrite ^/pi/(.*) /$1 break;
        proxy_pass http://192.168.1.151:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 2. Camera Stream Proxy (Go2RTC)
    # Proxies the main stream page
    location = /stream.html {
        proxy_pass http://192.168.1.150:1984;
    }

    # Proxies Go2RTC API and Websockets (needed for MSE/WebRTC)
    location /api/ {
        proxy_pass http://192.168.1.150:1984;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Proxies any potential static assets from Go2RTC if they don't conflict
    # (This is a best-effort; if go2rtc uses specific static folders, add them here)

    # 3. Serve React Frontend
    location / {
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
